services:
  - type: web
    name: aurora-luxe-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build && echo "=== DIST CONTENTS ===" && ls -R dist
    startCommand: npx prisma db push && npm run start:prod
    envVars:
      - key: NODE_VERSION
        value: 20.x
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
